# SIO Copilot -- EDA Tools Configuration

# --- PT SERVER (remote, pre-loaded) ---
pt_client_path:     /nfs/site/proj/lnc/c2dgbcptserver_sc8_fct/cth2_ptserver/cth2_ptserver_root/pt_client.pl
pt_client_access:   sg soc -c "pt_client.pl -m <mode> -c '<command>'"
pt_server_config:   pt_server_c2dgbcptserver_cron.cfg
pt_server_refresh:  daily at 00:00
pt_mode_format:     latest_gfcn2clienta0_bu_prp_<corner>
pt_forbidden_cmds:  source exit save exec insert_buffer size_cell
pt_debug_flag:      -debug

# --- PRIMETIME (local) ---
# pt_shell binary path (set via module/env)
# Requires: SNPSLMD_LICENSE_FILE

# --- PT-ECO ---
# pt_shell with ECO license
# Key commands: insert_buffer, remove_buffer, size_cell, swap_cell,
#               set_eco_options, write_changes, report_eco_changes

# --- ESTIMATE_ECO (PT shell) ---
# estimate_eco command inside pt_shell
# Quick what-if for ECO changes without full ECO flow

# --- PC-ECO (PrimeCraft) ---
# pc_shell binary path
# Key commands: set_pc_options, optimize_timing, report_pc_summary

# --- ICC2 ---
# icc2_shell binary path
# Key commands: place_eco_cells, route_eco_nets, legalize_placement

# --- FUSION COMPILER ---
# fc_shell binary path
# Key commands: compile_fusion, route_opt, place_opt

# --- INNOVUS (Cadence) ---
# innovus binary path
# Key commands: ecoPlace, ecoRoute, setEcoMode
# GAP: need command mapping from ICC2

# --- TEMPUS (Cadence STA) ---
# tempus binary path
# Status: confirm if used in GFC

# --- CONFORMAL LEC (Cadence FEV) ---
# lec binary path
# Run owner: gpavanku

# --- CALIBER ---
# Intel FC signoff rule checker
# Top rules: SlowSlope, MaxCap, ClockMinPulseWidth, LatchMarginWithRecovery

# --- RUN_AUTO_PT_ECO (flow orchestration) ---
run_auto_pt_eco:    /nfs/site/disks/ucde/tools/tool_utils/apr_eco/latest/scripts/run_auto_pt_eco.py
# Generates auto_pt_eco.csv and invokes sonicade
# NB defaults: class=SLES15&&500G&&16C  queue=/c2dg/BE_BigCore/gfc/sd  pool=sc8_express

# --- NETBATCH DEFAULTS ---
nb_class_default:   SLES15&&500G&&16C
nb_queue_default:   /c2dg/BE_BigCore/gfc/sd
nb_pool_default:    sc8_express
