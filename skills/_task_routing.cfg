# SIO Copilot -- Task Routing Table
# Format: <keywords> -> <skill_dirs> + <tool_dirs> + <data>
#
# Copilot: match user request keywords to this table,
# then read the listed dirs in order.

# --- IFC / CROSS-PARTITION ---
ifc debug, ifc timing, cross-partition, inter-face crossing
  -> skills/ifc/ + partitions/<par>/ + tools/pt_server/ + config/corners.cfg

ifc crossing <src> to <dst>
  -> skills/ifc/ + partitions/<src>/ + partitions/<dst>/ + tools/pt_server/

# --- DAILY MONITORING ---
daily status, partition status, build status, regressions
  -> skills/daily_monitoring/ + config/paths.cfg + data/daily_builds/

# --- BU MODEL / CONTOUR ---
new model, new build, process build, contour, bu model, daily drop
  -> skills/bu_model/ + config/paths.cfg + partitions/<par>/arc_paths.cfg

# --- MODEL COMPARISON ---
compare models, compare builds, diff models, model diff, build diff, trend
  -> skills/model_comparison/ + config/paths.cfg + partitions/<par>/status.txt

par status in <model1> vs <model2>
  -> skills/model_comparison/ + skills/daily_monitoring/ + partitions/<par>/

# --- SETUP TIMING ---
setup timing, setup violation, setup wns, setup analysis, worst setup
  -> skills/setup/ + partitions/<par>/ + tools/primetime/ + config/corners.cfg

# --- HOLD TIMING ---
hold timing, hold violation, hold wns, hold analysis, worst hold, hold per port
  -> skills/hold/ + partitions/<par>/ + tools/primetime/ + config/corners.cfg

hold daily vs pteco, hold comparison
  -> skills/hold/ + data/daily_builds/ + data/pteco/ + partitions/<par>/

# --- CLOCK ---
clock push, clock pull, push clock, pull clock, clock latency, clock rebalance
  -> skills/clock/ + partitions/<par>/constraints/ + tools/primetime/ + tools/pt_eco/

reconnect ff, ff to new clock, move ff, clock reconnect
  -> skills/clock/ + skills/eco/ + partitions/<par>/ + tools/pt_eco/ + tools/icc2/

clock skew, clock tree, cts, clock analysis
  -> skills/clock/ + partitions/<par>/ + tools/primetime/

# --- ECO ---
eco fix, buffer insert, cell upsize, vt swap, lvt ulvt, eco tcl
  -> skills/eco/ + tools/pt_eco/ + tools/icc2/ + partitions/<par>/

estimate eco, what if eco, eco impact
  -> skills/eco/ + tools/estimate_eco/ + partitions/<par>/ + config/corners.cfg

generate eco for innovus, innovus eco
  -> skills/eco/ + tools/innovus/ + partitions/<par>/

# --- REPORTING ---
what if, what happens if, impact of, show all corners
  -> skills/reporting/ + skills/<relevant_topic>/ + partitions/<par>/ + config/corners.cfg

status report, weekly report, summary
  -> skills/reporting/ + skills/daily_monitoring/ + partitions/<par>/

compare report, diff report
  -> skills/reporting/ + skills/model_comparison/ + partitions/<par>/

# --- SPECS ---
spec budget, missing specs, spec vs actual
  -> skills/specs/ + partitions/<par>/

# --- PVT ---
corner, voltage, derate, pvt, scenario, ocv
  -> skills/pvt/ + config/corners.cfg

# --- DFX ---
dfx, test mode, bist, bisr, jtag, ijtag, scanclk, scan chain
  -> skills/dfx/ + partitions/<par>/ + tools/primetime/ + config/corners.cfg

# --- CALIBER ---
caliber, slow slope, max cap, pulse width, signoff rule
  -> skills/caliber/ + partitions/<par>/ + tools/caliber_tool/

# --- FEV ---
fev, formal, equivalence, conformal, lec, greenstone
  -> skills/fev/ + partitions/<par>/ + tools/conformal/

# --- TIP ---
tip, topology, repeater, buffer chain
  -> skills/tip/ + partitions/<par>/

# --- HSD ---
hsd, bug, rtl4be, sio2po, dfx2po, file bug, track bug
  -> skills/hsd_tracking/

# --- CELL LIBRARY ---
cell, dont_use, dont use, lib cell, available cells, vt group, cell swap
  -> skills/cell_library/ + partitions/<par>/

# --- ROUTING ---
routing, metal layer, wire distance, cap, resistance, via, spef, net rc, monster net
  -> skills/routing/ + partitions/<par>/ + tools/primetime/

# --- CDC ---
cdc, clock domain crossing, async, synchronizer
  -> skills/cdc/ + partitions/<par>/

# --- POWER ---
power, leakage, dynamic power, power impact
  -> skills/power/ + partitions/<par>/

# --- REGRESSION ---
regression, why regressed, build regression, timing worse
  -> skills/regression_debug/ + skills/model_comparison/ + partitions/<par>/

# --- PRIMETIME QUERIES ---
report_timing, get_timing_paths, pba, path based, pt query, pt command
  -> tools/pt_server/ + tools/primetime/ + partitions/<par>/ + config/corners.cfg

# --- PARTITION STATUS ---
partition status, par status, what is status of par_*
  -> partitions/<par>/status.txt + partitions/<par>/known_issues.txt + skills/daily_monitoring/

# --- NB (NETBATCH) ---
nb, netbatch, submit job, run job, queue, nb pool, nb slots, job status, nbjob
  -> skills/nb/ + config/tools.cfg
pba via nb, restore session nb, pt session nb, run pba in nb
  -> skills/nb/ + skills/nb/cookbooks/nb_pba_cookbook.txt + skills/ifc/ + config/tools.cfg

# --- FLOW MANAGER ---
run flow, run model, run bu, run tag, create flow, launch run, run par, orchestrate, pipeline
  -> skills/flow_manager/ + skills/nb/ + skills/bu_model/ + config/paths.cfg + config/corners.cfg + partitions/<par>/
chain jobs, job dependency, multi-step flow, nb_flow, triggers, wait for job, sequential jobs
  -> skills/flow_manager/ + skills/flow_manager/cookbooks/nb_flow_cookbook.txt + skills/nb/

run <tag> for <par>, run new daily, run all partitions
  -> skills/flow_manager/ + skills/nb/ + skills/bu_model/ + partitions/<par>/

# --- PARANOIA / SANITY CHECKS ---
paranoia    -> skills/paranoia/ + partitions/<par>/ + config/corners.cfg
sanity      -> skills/paranoia/ + partitions/<par>/
verify      -> skills/paranoia/ + partitions/<par>/
audit       -> skills/paranoia/ + skills/cell_library/ + partitions/<par>/
crosscheck  -> skills/paranoia/ + skills/model_comparison/
baseline    -> skills/paranoia/ + skills/daily_monitoring/

# --- IP BLOCKS ---
ip          -> skills/ip/ + partitions/<par>/ + config/paths.cfg
ip_block    -> skills/ip/ + partitions/<par>/
macro       -> skills/ip/ + partitions/<par>/
hard_macro  -> skills/ip/ + partitions/<par>/
sram        -> skills/ip/ + partitions/<par>/
pll         -> skills/ip/ + partitions/<par>/
liberty     -> skills/ip/ + tools/primetime/
etm         -> skills/ip/ + tools/primetime/
ilm         -> skills/ip/ + tools/primetime/
ip_model    -> skills/ip/ + skills/model_comparison/

mow, map of world, carpet, visualization, port carpet
  -> tools/sio_mow/

shorts, opens, drc, extraction quality, star_pv, starrc, extract_quality, smin, physical quality, duet, caliber, antenna, density, congestion, placement, apr summary, violations, waivers, missing extraction data, min clock period, def parsing, floorplan, blockage, utilization
  -> skills/physical/

where is, find file, file location, model structure, ward structure, daily model,
release model, data map, spef location, def location, netlist location,
constraints location, collateral, sdc, upf, manifest, bootstrap, archive,
indicators, vrf, check timing, io constraints, clock definitions
  -> skills/data_map/

contour, contour tag, archive, bundle, eouMGR, populate, tag, collateral version,
arc, VER_, CONTOUR_, GOLDEN, timing_collateral tag, clock_collateral tag,
td_collateral tag, fe_collateral tag, sio_timing_collateral tag, assembly,
sd_layout, arc storage, partition archive, stepping
  -> skills/contour_model/

spef, spef query, net capacitance, net resistance, coupling cap, wire length,
metal layer, via count, manhattan distance, rc delay, net parasitics,
spef extract, net physical, routing data, bounding box, driver receiver
  -> skills/spef_query/

# --- Innovus On-Demand Session ---
innovus|open innovus|routing detail|congestion map|metal usage full|via breakdown|cell utilization|placement density|drc debug routing -> skills/innovus_query/

# --- PrimeTime Reference ---
pt command|pt syntax|report_timing syntax|primetime help|pt manual|pt options|pt error|pt variable|how to run pt|pt_shell|get_attribute syntax|snps tcl -> skills/pt_reference/

# --- Innovus Reference ---
innovus command|innovus syntax|innovus help|innovus manual|dbGet|reportRoute|reportDesign|verify_drc innovus|cadence command|stylus command|electromigration|em check -> skills/innovus_reference/
