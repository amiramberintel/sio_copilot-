## pt server directory - for pt_server_supervisor.pl
set pt_server_dir /nfs/site/proj/lnc/c2dgbcptserver_sc8_fct/cth2_ptserver/cth2_ptserver_root
set pt_server_model_link /nfs/site/proj/lnc/c2dgbcptserver_sc8_fct/cth2_ptserver/cth2_ptserver_root/pt_server_model_link
set pt_server_model_status_per_server /nfs/site/proj/lnc/c2dgbcptserver_sc8_fct/cth2_ptserver/cth2_ptserver_root/pt_server_model_status_per_server
set pt_server_model_status_per_model_type /nfs/site/proj/lnc/c2dgbcptserver_sc8_fct/cth2_ptserver/cth2_ptserver_root/pt_server_model_status_per_model_type
##Not in use - remain here just for reference, this shall be commented in code.
#set pt_server_tmp_disk /nfs/site/proj/lnc/c2dgbcptserver_sc8_fct/cth2_ptserver/cth2_ptserver_root/pt_server_tmp_disk/
##Used only for html tracking, not used by any of ptserver engine:
set pt_server_end_user_links /nfs/site/proj/lnc/c2dgbcptserver_sc8_fct/cth2_ptserver/cth2_ptserver_root/pt_server_model_link
## site
set site sc
##default .synopsys_pt.setup file
set aliases_file /nfs/site/disks/home_user/c2dgbcptserver/.synopsys_pt.setup
##admin list
set admin_list {yifrach ogivol c2dgbcptserver}
##special commands - commands that are redirected to server functions
set special_commands_list {refresh resource_server terminate refresh_no_restore get_dbs set_global_no_restore force_refresh set_as_modelb set_as_modela get_latest_status}
##forbidden commands list - available to admins only
set disallow_list {current_instance source resource_server set_ create_ exit quit save start_ end_ update_ fix_ exec refresh terminate refresh_no_restore set_global_no_restore force_refresh set_as_modelb set_as_modela size_cell insert_buffer}
##set daily refresh-time in HH:MM:
set refresh_time "00:00"
